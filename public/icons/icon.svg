  <!-- Building body -->
  <rect x="116" y="196" width="280" height="220" rx="8" fill="white" opacity="0.95"/>
  
  <!-- Roof / Triangle -->
  <polygon points="256,80 90,200 422,200" fill="white"/>
  
  <!-- Door -->
