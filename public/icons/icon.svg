  <!-- Windows row 1 -->
  <rect x="145" y="230" width="55" height="50" rx="5" fill="#4f46e5"/>
  <rect x="312" y="230" width="55" height="50" rx="5" fill="#4f46e5"/>
  
  <!-- Windows row 2 -->
  <rect x="145" y="295" width="55" height="50" rx="5" fill="#818cf8"/>
  <rect x="312" y="295" width="55" height="50" rx="5" fill="#818cf8"/>

  <!-- Flag pole -->
